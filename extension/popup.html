<!doctype html><html><head><meta charset="utf-8"><style>body{width:360px;margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef3f1;color:#102720}.top{background:#0f7d6e;color:white;padding:14px 16px;font-weight:800}.wrap{padding:14px}.btn{width:100%;border:0;background:#0f7d6e;color:white;font-weight:800;border-radius:10px;padding:11px;margin:6px 0;cursor:pointer}.btn.secondary{background:white;color:#102720;border:1px solid #dce6e2}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status{background:#0f172a;color:#d8fff3;border-radius:10px;padding:10px;margin-top:10px;white-space:pre-wrap;max-height:180px;overflow:auto;font-size:12px}input{width:100%;padding:9px;border:1px solid #ccd9d5;border-radius:9px;box-sizing:border-box;margin:5px 0}</style></head><body><div class="top">Map Zone Intelligence V3</div><div class="wrap"><button id="check" class="btn">Check Backend</button><button id="dash" class="btn secondary">Open Dashboard</button><div class="row"><button id="capture" class="btn secondary">Capture Current Map</button><button id="send" class="btn">Send Zone Fetch</button></div><input id="radius" placeholder="Radius meters" value="350"><input id="area" placeholder="Area hint, e.g. Banani DOHS"><input id="road" placeholder="Road hint, e.g. Lane 4 East"><button id="loadApply" class="btn secondary">Load Apply JSON</button><button id="fillNext" class="btn secondary">Fill Next Approved Record</button><button id="options" class="btn secondary">Options</button><div id="status" class="status">Ready.</div><input type="file" id="file" accept="application/json" style="display:none"></div><script src="popup.js"></script></body></html>
